display_name: Decision Gate
short_description: Runtime decision routing — three categories, nine outputs, Policy overrides all
default_prompt: >
  During long-running or multi-step tasks, evaluate execution health, requirement health,
  and decision health at each checkpoint. TRIGGER_DECISION = f(Threshold, Confidence, Policy).
  Decision Policy overrides the Trigger Engine — it can suppress, mandate, or redirect routing
  regardless of health signals. Route to one of three categories: Execution Actions (Continue,
  Retry, Fallback, Parallelize), Coordination (Ask User, Checkpoint, Escalate), or Termination
  (Re-plan, Abort). Never gate on single transient failures.
